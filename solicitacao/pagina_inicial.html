<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Solicitação de Compras — Hidrogood</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f4f3ef; color: #1a1a18; min-height: 100vh; padding: 2rem 1rem; }
    .page { max-width: 740px; margin: 0 auto; }

    .header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 1.5px solid #c8c7be; }
    .brand { font-size: 11px; font-weight: 600; letter-spacing: 0.14em; color: #888780; text-transform: uppercase; margin-bottom: 4px; }
    .title { font-size: 22px; font-weight: 500; color: #1a1a18; }
    .numero-field { text-align: right; }
    .numero-field label { display: block; font-size: 11px; color: #888780; margin-bottom: 4px; }
    .numero-field input { width: 120px; text-align: right; }

    .card { background: #ffffff; border: 0.5px solid #d3d1c7; border-radius: 12px; padding: 1.25rem; margin-bottom: 1rem; }
    .section-label { font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: #888780; margin-bottom: 0.85rem; display: flex; align-items: center; gap: 6px; }
    .section-label i { font-size: 14px; }

    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
    .field { display: flex; flex-direction: column; gap: 4px; }
    .field label { font-size: 12px; color: #5f5e5a; }
    input, textarea, select {
      font-family: inherit; font-size: 14px;
      border: 0.5px solid #b4b2a9; border-radius: 8px;
      padding: 8px 10px; background: #f4f3ef; color: #1a1a18; width: 100%;
      transition: border-color 0.15s, background 0.15s;
    }
    input:focus, textarea:focus, select:focus { outline: none; border-color: #5f5e5a; background: #ffffff; }
    textarea { resize: vertical; min-height: 64px; }

    .urgencia-row { display: flex; gap: 10px; }
    .urgencia-btn {
      flex: 1; padding: 9px; border-radius: 8px;
      border: 0.5px solid #b4b2a9; background: #f4f3ef;
      font-family: inherit; font-size: 13px; cursor: pointer;
      color: #5f5e5a; transition: all 0.15s;
    }
    .urgencia-btn:hover { border-color: #5f5e5a; color: #1a1a18; }
    .urgencia-btn.alta.active  { background: #FCEBEB; border-color: #E24B4A; color: #A32D2D; font-weight: 500; }
    .urgencia-btn.media.active { background: #FAEEDA; border-color: #BA7517; color: #854F0B; font-weight: 500; }
    .urgencia-btn.baixa.active { background: #EAF3DE; border-color: #639922; color: #3B6D11; font-weight: 500; }

    .divisao-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
    .div-btn {
      padding: 8px 6px; border-radius: 8px;
      border: 0.5px solid #b4b2a9; background: #f4f3ef;
      font-family: inherit; font-size: 12px; cursor: pointer;
      color: #5f5e5a; text-align: center; transition: all 0.15s;
    }
    .div-btn:hover { border-color: #5f5e5a; color: #1a1a18; }
    .div-btn.active { background: #EEEDFE; border-color: #534AB7; color: #3C3489; font-weight: 500; }

    .items-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .items-table th { text-align: left; font-size: 11px; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; color: #888780; padding: 0 6px 8px; border-bottom: 0.5px solid #d3d1c7; }
    .items-table td { padding: 4px 6px; }
    .items-table td input { border: none; background: transparent; font-size: 13px; color: #1a1a18; font-family: inherit; width: 100%; padding: 6px 4px; border-radius: 6px; }
    .items-table td input:hover { background: #f4f3ef; }
    .items-table td input:focus { outline: none; background: #f4f3ef; border: none; }
    .items-table .num { color: #888780; font-size: 12px; text-align: center; width: 28px; }
    .add-row {
      display: flex; align-items: center; gap: 6px; margin-top: 10px;
      padding: 6px 10px; border-radius: 8px; font-size: 12px; color: #888780;
      cursor: pointer; border: 0.5px dashed #b4b2a9; background: none;
      font-family: inherit; transition: all 0.15s;
    }
    .add-row:hover { color: #5f5e5a; border-color: #5f5e5a; background: #f4f3ef; }

    .alcada-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    .alcada-box { border: 0.5px solid #d3d1c7; border-radius: 8px; padding: 1rem; text-align: center; }
    .alcada-box .alcada-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: #888780; margin-bottom: 0.75rem; }
    .alcada-box .sign-line { border-top: 0.5px solid #888780; margin-top: 2.5rem; padding-top: 6px; font-size: 11px; color: #888780; }

    .submit-row { display: flex; align-items: center; justify-content: space-between; margin-top: 0.5rem; flex-wrap: wrap; gap: 12px; }
    .sign-field { display: flex; align-items: center; gap: 12px; }
    .sign-field label { font-size: 12px; color: #5f5e5a; white-space: nowrap; }
    .sign-field input { border: none; border-bottom: 0.5px solid #888780; background: transparent; font-size: 13px; font-family: inherit; color: #1a1a18; padding: 4px 8px; width: 200px; border-radius: 0; }
    .sign-field input:focus { outline: none; border-bottom-color: #1a1a18; background: transparent; }

    .btn-submit {
      padding: 10px 22px; background: #1a1a18; color: #ffffff;
      border: none; border-radius: 8px; font-family: inherit;
      font-size: 13px; font-weight: 500; cursor: pointer;
      display: flex; align-items: center; gap: 7px; transition: opacity 0.15s;
    }
    .btn-submit:hover { opacity: 0.82; }

    .success-banner {
      display: none; background: #EAF3DE; border: 0.5px solid #639922;
      color: #3B6D11; border-radius: 8px; padding: 11px 16px;
      font-size: 13px; align-items: center; gap: 8px; margin-top: 1rem;
    }

    @media print {
      body { background: white; padding: 0; }
      .btn-submit, .add-row { display: none; }
      .card { border: 1px solid #ccc; page-break-inside: avoid; }
    }

    @media (max-width: 560px) {
      .divisao-grid { grid-template-columns: repeat(2, 1fr); }
      .grid-2, .grid-3 { grid-template-columns: 1fr; }
      .alcada-row { grid-template-columns: 1fr; }
      .submit-row { flex-direction: column; align-items: flex-start; }
      .header { flex-direction: column; gap: 12px; }
    }
  </style>
</head>
<body>
  <div class="page">

    <div class="header">
      <div>
        <div class="brand">Hidrogood</div>
        <div class="title">Solicitação de Compras</div>
      </div>
      <div class="numero-field">
        <label>Número</label>
        <input type="text" placeholder="SC-0001" />
      </div>
    </div>

    <div class="card">
      <div class="section-label"><i class="ti ti-layout-grid"></i> Divisão</div>
      <div class="divisao-grid">
        <button class="div-btn" onclick="toggle(this)">HG Estufa</button>
        <button class="div-btn" onclick="toggle(this)">HG Fert</button>
        <button class="div-btn" onclick="toggle(this)">HG Hidroponia</button>
        <button class="div-btn" onclick="toggle(this)">HG Academy</button>
      </div>
    </div>

    <div class="card">
      <div class="section-label"><i class="ti ti-alert-triangle"></i> Urgência</div>
      <div class="urgencia-row">
        <button class="urgencia-btn alta"  onclick="urgencia(this,'alta')">Alta</button>
        <button class="urgencia-btn media" onclick="urgencia(this,'media')">Média</button>
        <button class="urgencia-btn baixa" onclick="urgencia(this,'baixa')">Baixa</button>
      </div>
    </div>

    <div class="card">
      <div class="section-label"><i class="ti ti-user"></i> Identificação</div>
      <div class="grid-2" style="margin-bottom:12px;">
        <div class="field"><label>Solicitante</label><input type="text" placeholder="Nome completo" /></div>
        <div class="field"><label>Departamento</label><input type="text" placeholder="Ex: Produção" /></div>
      </div>
      <div class="grid-2" style="margin-bottom:12px;">
        <div class="field"><label>Centro de Custo / Projeto</label><input type="text" placeholder="Ex: CC-001" /></div>
        <div class="field"><label>Data</label><input type="date" /></div>
      </div>
      <div class="field"><label>Justificativa da Aquisição</label><textarea placeholder="Descreva o motivo da solicitação..."></textarea></div>
    </div>

    <div class="card">
      <div class="section-label"><i class="ti ti-list"></i> Itens da Solicitação</div>
      <table class="items-table">
        <thead>
          <tr>
            <th style="width:30px;">#</th>
            <th>Descrição</th>
            <th style="width:85px;">U.M.</th>
            <th style="width:100px;">Quantidade</th>
          </tr>
        </thead>
        <tbody id="items-body">
          <tr><td class="num">1</td><td><input type="text" placeholder="Descrição do item" /></td><td><input type="text" placeholder="Un, Kg…" /></td><td><input type="number" placeholder="0" min="0" /></td></tr>
          <tr><td class="num">2</td><td><input type="text" placeholder="Descrição do item" /></td><td><input type="text" placeholder="Un, Kg…" /></td><td><input type="number" placeholder="0" min="0" /></td></tr>
          <tr><td class="num">3</td><td><input type="text" placeholder="Descrição do item" /></td><td><input type="text" placeholder="Un, Kg…" /></td><td><input type="number" placeholder="0" min="0" /></td></tr>
        </tbody>
      </table>
      <button class="add-row" onclick="addRow()"><i class="ti ti-plus"></i> Adicionar item</button>
    </div>

    <div class="card">
      <div class="section-label"><i class="ti ti-building-store"></i> Fornecedores Recomendados <span style="font-size:10px;font-weight:400;letter-spacing:0;">(se houver)</span></div>
      <div class="grid-3">
        <div class="field"><label>Fornecedor 1</label><input type="text" placeholder="Nome" /></div>
        <div class="field"><label>Fornecedor 2</label><input type="text" placeholder="Nome" /></div>
        <div class="field"><label>Fornecedor 3</label><input type="text" placeholder="Nome" /></div>
      </div>
    </div>

    <div class="card">
      <div class="section-label"><i class="ti ti-calendar"></i> Data Desejada de Entrega</div>
      <div class="field" style="max-width:240px;">
        <label>Data na Hidrogood</label>
        <input type="date" />
      </div>
    </div>

    <div class="card">
      <div class="section-label"><i class="ti ti-writing"></i> Alçada de Aprovação</div>
      <div class="alcada-row">
        <div class="alcada-box"><div class="alcada-title">Compras</div><div class="sign-line">Assinatura</div></div>
        <div class="alcada-box"><div class="alcada-title">Gerência</div><div class="sign-line">Assinatura</div></div>
        <div class="alcada-box"><div class="alcada-title">Diretoria</div><div class="sign-line">Assinatura</div></div>
      </div>
    </div>

    <div class="submit-row">
      <div class="sign-field">
        <label>Assinatura do Solicitante:</label>
        <input type="text" placeholder="Nome / Rubrica" />
      </div>
      <button class="btn-submit" onclick="submitForm()">
        <i class="ti ti-send"></i> Enviar solicitação
      </button>
    </div>

    <div class="success-banner" id="success">
      <i class="ti ti-circle-check"></i> Solicitação enviada com sucesso!
    </div>

  </div>

  <script src="paginia_inicial.js"></script>
</body>
</html>
